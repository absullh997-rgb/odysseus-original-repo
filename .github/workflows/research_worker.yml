name: Odysseus Deep Research Worker

# This workflow offloads heavy deep-research jobs from Hugging Face Spaces
# (limited to 16GB RAM) to GitHub Actions (up to 7GB RAM, free tier).
# Triggered via repository_dispatch from the HF Space or manually.

on:
  repository_dispatch:
    types: [run_deep_research]
  workflow_dispatch:
    inputs:
      query:
        description: 'Research query to process'
        required: true
        type: string
      session_id:
        description: 'Session ID to associate results with'
        required: false
        type: string
      callback_url:
        description: 'URL to POST results back to (HF Space endpoint)'
        required: false
        type: string

jobs:
  deep-research:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install research dependencies
        run: |
          pip install --upgrade pip
          pip install httpx aiohttp beautifulsoup4 requests python-dotenv markdown nh3

      - name: Extract inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "query=${{ github.event.client_payload.query }}" >> $GITHUB_OUTPUT
            echo "session_id=${{ github.event.client_payload.session_id }}" >> $GITHUB_OUTPUT
            echo "callback_url=${{ github.event.client_payload.callback_url }}" >> $GITHUB_OUTPUT
          else
            echo "query=${{ github.event.inputs.query }}" >> $GITHUB_OUTPUT
            echo "session_id=${{ github.event.inputs.session_id }}" >> $GITHUB_OUTPUT
            echo "callback_url=${{ github.event.inputs.callback_url }}" >> $GITHUB_OUTPUT
          fi

      - name: Run deep research
        env:
          RESEARCH_QUERY: ${{ steps.inputs.outputs.query }}
          SESSION_ID: ${{ steps.inputs.outputs.session_id }}
          CALLBACK_URL: ${{ steps.inputs.outputs.callback_url }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/github_research_worker.py

      - name: Upload research results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: research-results-${{ steps.inputs.outputs.session_id || github.run_id }}
          path: research_output/
          retention-days: 1
