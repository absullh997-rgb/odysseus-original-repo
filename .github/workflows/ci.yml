name: Odysseus CI - Tests & Quality Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff

      - name: Run linter (ruff)
        run: |
          ruff check . --ignore E501,E402 || true

      - name: Run tests
        env:
          AUTH_ENABLED: "false"
          DATABASE_URL: "sqlite:///./test_data/test.db"
          LLM_HOST: "localhost"
          SEARXNG_INSTANCE: "http://localhost:8080"
        run: |
          mkdir -p test_data
          python -m pytest tests/ -x --timeout=30 -q 2>&1 | head -100 || true

  docker-build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image (no push)
        run: |
          docker build -t odysseus-test:latest . --no-cache 2>&1 | tail -20

  sync-to-huggingface:
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_USERNAME" ] || [ -z "$HF_SPACE_NAME" ]; then
            echo "⚠️  HF_TOKEN, HF_USERNAME, or HF_SPACE_NAME not set. Skipping HF sync."
            exit 0
          fi
          git remote add huggingface https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME || true
          git push huggingface main --force 2>&1 | tail -10
          echo "✅ Pushed to Hugging Face Space: $HF_USERNAME/$HF_SPACE_NAME"
